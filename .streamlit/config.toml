[theme]
primaryColor     = "#7c3aed"
backgroundColor  = "#ffffff"
secondaryBackgroundColor = "#f5f3ff"
textColor        = "#2e1065"
font             = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless         = true
enableCORS       = false
enableXsrfProtection = false

[client]
showSidebarNavigation = false
toolbarMode      = "viewer"
